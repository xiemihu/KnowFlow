services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-knowflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knowflow} -d ${POSTGRES_DB:-knowflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: knowflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-knowflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-knowflow_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: knowflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowflow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      disable: true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowflow-backend
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - MINIO_HOST=minio
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowflow-celery
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - MINIO_HOST=minio
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  frontend-dev:
    image: node:20-alpine
    container_name: knowflow-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
  qdrant_data:
